name: Deploy Frontend to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v3

      - name: Comprimir carpeta frontend
        run: |
          cd frontend
          zip -r ../frontend.zip .
          cd ..

      - name: Desplegar en Azure Web App usando Perfil de Publicación
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'sme-frontend-master'
          publish-profile: ${{ secrets.AZURE_CREDENTIALS }} # Aquí lee el secreto que acabas de guardar
          package: './frontend.zip'