name: Deploy Backend to Azure Functions

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Instalar Dependencias del Backend
        run: |
          cd api
          if [ -f package.json ]; then npm install; fi
          cd ..

      - name: Desplegar en Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: 'sme-api-master-pablo' # Modifica esto por el nombre exacto de tu Function App
          package: './api'
          publish-profile: ${{ secrets.AZURE_FUNCTION_APP_PUBLISH_PROFILE }}