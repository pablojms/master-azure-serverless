name: Deploy Backend to Azure Functions

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-size: '18.x'

      - name: Instalar Dependencias de la API
        run: |
          cd api
          npm install
          cd ..

      - name: Login Oficial en Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Desplegar subcarpeta API en Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: 'sme-api-master-pablo'
          package: './api'  # <--- CRÍTICO: Esto obliga a subir solo el contenido de la carpeta api