<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyecto Master Serverless</title>
</head>
<body>
    <h1>Panel de Control Serverless</h1>
    <button id="btn">Consultar Base de Datos</button>
    <pre id="resultado"></pre> <script>
        document.getElementById('btn').addEventListener('click', async () => {
            // Pega aquí la URL completa que obtienes de "Get Function URL" en Azure
            const url = 'TU_URL_DE_AZURE_FUNCTIONS_AQUÍ';
            
            try {
                const res = await fetch(url);
                if (!res.ok) {
                    throw new Error(`Error en el servidor: ${res.status}`);
                }
                const data = await res.json();
                document.getElementById('resultado').innerText = JSON.stringify(data, null, 2);
            } catch (error) {
                console.error("Error al consultar la API:", error);
                document.getElementById('resultado').innerText = "Error al conectar con el backend.";
            }
        });
    </script>
</body>
</html>
